<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sumi (墨) — Open Graph / Twitter card (1200x630)

  Layout (revised):
  - Mark on the left at roughly 1/3 of the canvas width
  - Wordmark + tagline + meta on the right column, anchored at x=640
  - Everything sized so there is generous negative space (ma)
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 630"
  width="1200"
  height="630"
  role="img"
  aria-labelledby="sumi-og-title sumi-og-desc"
>
  <title id="sumi-og-title">Sumi — Claude Code を、墨でしたためる。</title>
  <desc id="sumi-og-desc">
    Open Graph social card for Sumi, a Japanese desktop IDE for Claude Code.
  </desc>

  <defs>
    <linearGradient id="og-kasure" x1="0.05" y1="0" x2="0.95" y2="0.02">
      <stop offset="0%"   stop-color="#f3eee7" stop-opacity="0.92" />
      <stop offset="8%"   stop-color="#f3eee7" stop-opacity="1" />
      <stop offset="42%"  stop-color="#f3eee7" stop-opacity="1" />
      <stop offset="64%"  stop-color="#f3eee7" stop-opacity="0.96" />
      <stop offset="78%"  stop-color="#f3eee7" stop-opacity="0.72" />
      <stop offset="88%"  stop-color="#f3eee7" stop-opacity="0.34" />
      <stop offset="96%"  stop-color="#f3eee7" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#f3eee7" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="og-fiber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0c0e12" stop-opacity="0" />
      <stop offset="55%"  stop-color="#0c0e12" stop-opacity="0" />
      <stop offset="68%"  stop-color="#0c0e12" stop-opacity="0.45" />
      <stop offset="86%"  stop-color="#0c0e12" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#0c0e12" stop-opacity="0" />
    </linearGradient>

    <pattern id="og-paper" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#0c0e12" />
      <circle cx="1.5" cy="1.5" r="0.18" fill="#191c21" opacity="0.55" />
      <circle cx="4.5" cy="3.8" r="0.14" fill="#191c21" opacity="0.40" />
    </pattern>

    <radialGradient id="og-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#c15f3c" stop-opacity="0.18" />
      <stop offset="60%" stop-color="#c15f3c" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#c15f3c" stop-opacity="0" />
    </radialGradient>

    <!--
      Scaled mark path: source is the 64x64 logo-mark path. Scale factor 7
      makes the mark ~448px wide. Translation: place at (120, 260) so it
      visually centers in left third.
    -->
    <clipPath id="og-stroke-clip">
      <path d="
        M 63 458.1 C 86.1 449.0 118.9 445.5 157.5 447.25 C 201.25 449.25 241.5 452.75 280.0 458.0 C 316.75 463.25 349.3 469.55 378.0 476.55 L 393.75 480.05 C 395.5 484.25 395.5 488.45 393.75 492.65 L 379.75 495.45 C 349.3 501.05 315.7 504.55 274.75 505.25 C 227.5 506.0 182.0 504.6 143.5 501.8 C 110.25 499.7 84.7 496.2 66.5 492.0 C 63 487.8 61.25 466.1 63 458.1 Z
      " transform="translate(120, 0) scale(1)" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0e12" />
  <rect width="1200" height="630" fill="url(#og-paper)" />

  <!-- Hairline rule -->
  <rect x="100" y="564" width="1000" height="1" fill="#33363d" />

  <!--
    Mark: use the same path as logo-mark-light.svg, transform into position.
    Base viewBox was 64x64; scale factor 7 = output 448x448; but we only need
    the stroke+drop portion which occupies ~46u wide and spans y=26..47.
  -->
  <g transform="translate(120, 80) scale(7)">
    <!-- Stroke (mark-kasure-l equivalent, inline) -->
    <path d="
      M 9.0 28.3
      C 12.3 27.0 17.0 26.5 22.5 26.75
      C 28.75 27.0 34.5 27.5 40.0 28.25
      C 45.25 29.0 49.9 29.9 54.0 30.9
      L 56.25 31.4
      C 56.5 32.0 56.5 32.6 56.25 33.2
      L 54.25 33.6
      C 49.9 34.4 45.1 34.9 39.25 35.0
      C 32.5 35.1 26.0 34.9 20.5 34.5
      C 15.75 34.2 12.1 33.7 9.5 33.1
      C 9.0 32.5 8.75 30.0 9.0 28.3
      Z
    " fill="url(#og-kasure)" />

    <!-- Fiber streaks clipped to stroke -->
    <g clip-path="url(#og-stroke-clip)" transform="translate(-120, 0) scale(0.14286)">
      <!-- Not easily supported; we'll fall back to direct fiber paths below -->
    </g>

    <!-- Inline fiber streaks at mark scale (positions chosen so they appear within the tail) -->
    <rect x="36" y="29.4" width="20" height="0.18" fill="url(#og-fiber)" />
    <rect x="37" y="30.3" width="19.5" height="0.14" fill="url(#og-fiber)" />
    <rect x="38" y="31.2" width="18.5" height="0.20" fill="url(#og-fiber)" />
    <rect x="37" y="32.0" width="19.5" height="0.14" fill="url(#og-fiber)" />
    <rect x="39" y="32.9" width="17.5" height="0.18" fill="url(#og-fiber)" />

    <!-- Accent drop + highlight -->
    <ellipse cx="13.3" cy="46.3" rx="3.0" ry="3.45" fill="#c15f3c" />
    <ellipse cx="12.5" cy="45.2" rx="0.85" ry="1.0" fill="#f3eee7" fill-opacity="0.26" />
  </g>

  <!-- Soft glow behind drop (drawn over the mark so the orange remains crisp) -->
  <!-- Positions computed: mark drop center is at (13.3*7+120, 46.3*7+80) = (213, 404). Glow ellipse centers there. -->
  <ellipse cx="213" cy="404" rx="130" ry="130" fill="url(#og-glow)" style="mix-blend-mode: screen" />

  <!-- ===== Right column: wordmark + tagline + meta ===== -->
  <!--
    Wordmark at scale 2.1 -> width ~210px; fits comfortably in right column
    (640..1100 = 460u of space, keeps padding)
  -->
  <g transform="translate(640, 230) scale(2.1)">
    <path d="
      M 28.6 30.8 C 28.6 28.2 26.6 26.8 22.8 26.8 C 19.2 26.8 17.0 28.4 17.0 30.6
      C 17.0 32.2 18.2 33.2 20.6 33.6 L 24.4 34.2 C 28.4 34.8 30.6 36.6 30.6 39.6
      C 30.6 43.2 27.2 45.6 22.2 45.6 C 17.2 45.6 14.2 43.2 14.0 39.8 L 17.0 39.8
      C 17.2 41.8 19.2 43.0 22.2 43.0 C 25.4 43.0 27.4 41.6 27.4 39.6 C 27.4 38.0 26.4 37.0 23.8 36.6
      L 19.8 36.0 C 15.8 35.4 13.8 33.6 13.8 30.6 C 13.8 27.0 17.0 24.4 22.6 24.4
      C 28.0 24.4 31.4 27.0 31.6 30.8 Z
    " fill="#f3eee7" />
    <path d="
      M 38.4 25.0 L 41.4 25.0 L 41.4 38.2 C 41.4 41.6 43.2 43.0 46.2 43.0
      C 49.2 43.0 51.0 41.6 51.0 38.2 L 51.0 25.0 L 54.0 25.0 L 54.0 45.2 L 51.0 45.2 L 51.0 42.2
      C 50.0 44.4 47.8 45.6 45.2 45.6 C 41.2 45.6 38.4 43.2 38.4 38.4 Z
    " fill="#f3eee7" />
    <path d="
      M 62.2 25.0 L 65.2 25.0 L 65.2 28.0 C 66.2 25.8 68.2 24.6 70.8 24.6
      C 73.8 24.6 75.8 26.0 76.6 28.4 C 77.6 26.0 79.8 24.6 82.6 24.6
      C 86.6 24.6 89.2 27.0 89.2 31.8 L 89.2 45.2 L 86.2 45.2 L 86.2 32.0
      C 86.2 28.6 84.6 27.2 81.8 27.2 C 79.0 27.2 77.2 28.8 77.2 32.2 L 77.2 45.2 L 74.2 45.2 L 74.2 32.0
      C 74.2 28.6 72.6 27.2 69.8 27.2 C 67.0 27.2 65.2 28.8 65.2 32.2 L 65.2 45.2 L 62.2 45.2 Z
    " fill="#f3eee7" />
    <circle cx="98.8" cy="19.2" r="1.8" fill="#f3eee7" />
    <path d="M 97.2 25.0 L 100.2 25.0 L 100.2 45.2 L 97.2 45.2 Z" fill="#f3eee7" />
  </g>

  <!-- Tagline -->
  <text
    x="640"
    y="400"
    fill="#b2aca2"
    font-family="'Geist Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', system-ui, sans-serif"
    font-size="32"
    font-weight="400"
    letter-spacing="0.02em"
  >Claude Code を、墨でしたためる。</text>

  <!-- Meta -->
  <text
    x="640"
    y="530"
    fill="#515358"
    font-family="'Geist Mono', 'JetBrains Mono', ui-monospace, monospace"
    font-size="16"
    font-weight="400"
    letter-spacing="0.08em"
  >TAURI 2  ·  NEXT.JS  ·  CLAUDE CODE  ·  JP FIRST</text>
</svg>
