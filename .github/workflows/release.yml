# ============================================================================
# Sumi / Multi-platform Release Build (PM-282 / DEC-065 v1.19.0)
# ----------------------------------------------------------------------------
# 目的:
#   v* タグが push されたタイミングで Windows (NSIS/MSI) / macOS (DMG x64 +
#   aarch64) / Linux (AppImage/deb) のインストーラを並列ビルドし、GitHub
#   Release に自動添付する。合わせて tauri-plugin-updater 用の latest.json
#   を生成して同じ Release に upload する。
#
#   workflow_dispatch でも走らせられるが、その場合は Release を作らず artifact
#   upload のみ（dogfood 用）。
#
# トリガ:
#   - push tag v*   … 本番 Release 生成（prerelease は -rc / -beta を含む場合）
#   - workflow_dispatch … 手動ビルド、Release 非生成
#
# 既存 build-windows.yml は dogfood iteration 用に workflow_dispatch で残す。
# 本 workflow とは独立。
#
# DEC-065 (v1.19.0): Ed25519 署名検証ベースに移行。
#   - v1.18.2 で試みた「signature field 省略」方針A は tauri-plugin-updater
#     v2.10.x の ReleaseManifestPlatform.signature が serde 上 `String` 必須
#     field のため deserialize 失敗で破綻。Ed25519 鍵ペアを発行し、各 installer
#     に `.sig` ファイルを生成して latest.json の `signature` に埋め込む本来の
#     運用へ切り替えた。
#   - `TAURI_SIGNING_PRIVATE_KEY` / `TAURI_SIGNING_PRIVATE_KEY_PASSWORD` を
#     GitHub repository secrets に登録すると、tauri-cli が bundle 時に
#     自動で `.sig` を生成する。secret 未登録の fork PR では警告 log を出して
#     unsigned build で続行し、artifact は出るが updater は動かない（本家
#     main の release では必ず signed される）。
#
# 注意:
#   - Linux は ubuntu-latest（24.04）で webkit2gtk 4.1 前提。もし 22.04 系の
#     古い glibc 互換が必要になった場合は matrix に ubuntu-22.04 を追加する。
# ----------------------------------------------------------------------------

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (artifact upload only, no Release)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

# 同じタグで複数回起動されても最後のみ有効。並列ビルドを無駄に走らせない。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # --------------------------------------------------------------------------
  # build: 各プラットフォームで Tauri bundle を生成
  # --------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.platform.label }})
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        platform:
          # DEC-065 (v1.19.0): 各 installer の `.sig` (ed25519 署名) も artifact
          # に含める。tauri-cli は `<installer>.sig` を同一ディレクトリに出力する。
          - label: 'windows-x86_64'
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ''
            bundle_globs: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.exe.sig
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/msi/*.msi.sig
          - label: 'darwin-x86_64'
            # v1.0.1: macos-13 は GitHub で deprecated、macos-14 (Apple Silicon)
            # で x86_64-apple-darwin を cross-compile する方針に変更。
            # rustup の target 追加 + `--target x86_64-apple-darwin` で動作。
            runner: macos-14
            rust_target: x86_64-apple-darwin
            tauri_args: '--target x86_64-apple-darwin'
            bundle_globs: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg.sig
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - label: 'darwin-aarch64'
            runner: macos-14
            rust_target: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'
            bundle_globs: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg.sig
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - label: 'linux-x86_64'
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ''
            bundle_globs: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/appimage/*.AppImage.sig
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/deb/*.deb.sig

    env:
      # DEC-065 (v1.19.0): Ed25519 署名付きビルド。Secret 未登録だと空文字が
      # 渡り、tauri-cli は warning を出して unsigned bundle を生成する
      # (fork PR でも build は通る)。本家 main の tag release では必ず Secret
      # が登録されている前提で .sig が artifact に並ぶ。
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      NPM_CONFIG_LEGACY_PEER_DEPS: 'true'
      RUST_BACKTRACE: '1'
      TAURI_CLI_VERBOSE: '1'

    steps:
      # ------------------------------------------------------------------
      # 1. checkout
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1

      # ------------------------------------------------------------------
      # 2. Linux 用の追加依存（webkit2gtk / libayatana-appindicator / librsvg）
      #    ubuntu-latest = 24.04 では webkit2gtk-4.1 が必要。
      # ------------------------------------------------------------------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file

      # ------------------------------------------------------------------
      # 3. Node.js 24 LTS
      # ------------------------------------------------------------------
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json

      # ------------------------------------------------------------------
      # 4. Rust 1.94.0 + ターゲット
      # ------------------------------------------------------------------
      - name: Setup Rust 1.94.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.94.0'
          targets: ${{ matrix.platform.rust_target }}

      # ------------------------------------------------------------------
      # 5. Cargo キャッシュ
      # ------------------------------------------------------------------
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform.label }}

      # ------------------------------------------------------------------
      # 6. npm / node_modules キャッシュ（キーに platform を含めて分離）
      # ------------------------------------------------------------------
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            node_modules
            sidecar/node_modules
          key: ${{ matrix.platform.label }}-node24-${{ hashFiles('package.json', 'sidecar/package.json') }}
          restore-keys: |
            ${{ matrix.platform.label }}-node24-

      # ------------------------------------------------------------------
      # 7. Frontend / Sidecar install + bundle
      # ------------------------------------------------------------------
      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Install sidecar dependencies
        working-directory: sidecar
        run: npm install

      - name: Bundle sidecar (esbuild)
        working-directory: sidecar
        run: npm run build

      - name: Verify sidecar bundle (POSIX)
        if: runner.os != 'Windows'
        run: |
          if [ ! -f "sidecar/dist/index.mjs" ]; then
            echo "sidecar/dist/index.mjs not found after build!" >&2
            exit 1
          fi
          ls -lh sidecar/dist/index.mjs

      - name: Verify sidecar bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-Not (Test-Path "sidecar/dist/index.mjs")) {
            Write-Error "sidecar/dist/index.mjs not found after build!"
            exit 1
          }
          Get-Item "sidecar/dist/index.mjs" | Select-Object Name, Length

      # ------------------------------------------------------------------
      # 8. 署名鍵の有無を check (DEC-065 v1.19.0 / v1.20.1 strict)
      #
      #    v1.19.0 までは Secret 未登録の fork PR を許容する graceful fallback
      #    だったが、**tag release (`refs/tags/v*`) では unsigned build を
      #    絶対に release させない** strict mode に変更した (v1.20.1)。
      #    v1.19.0 / v1.20.0 で signature が空の latest.json が配布され、
      #    既存 installed binary が「Invalid encoding in minisign data」エラーを
      #    吐いて自動更新不能になる事故を繰り返さないため。
      #
      #    - tag push の場合: Secret 未登録なら即 fail
      #    - workflow_dispatch (dry run) / PR: 従来通り warning のみで続行
      # ------------------------------------------------------------------
      - name: Check signing key availability (POSIX)
        if: runner.os != 'Windows'
        run: |
          IS_TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            if [ "$IS_TAG" != "$GITHUB_REF" ]; then
              echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set for a tag release. Refusing to publish unsigned bundle (would break auto-update for existing users)."
              exit 1
            fi
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY is not set. Building unsigned bundle (updater won't work)."
            echo "SUMI_BUILD_SIGNED=false" >> "$GITHUB_ENV"
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is set. Building signed bundle."
            echo "SUMI_BUILD_SIGNED=true" >> "$GITHUB_ENV"
          fi

      - name: Check signing key availability (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $isTag = $env:GITHUB_REF.StartsWith("refs/tags/")
          if ([string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY)) {
            if ($isTag) {
              Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY is not set for a tag release. Refusing to publish unsigned bundle (would break auto-update for existing users)."
              exit 1
            }
            Write-Host "::warning::TAURI_SIGNING_PRIVATE_KEY is not set. Building unsigned bundle (updater won't work)."
            "SUMI_BUILD_SIGNED=false" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY is set. Building signed bundle."
            "SUMI_BUILD_SIGNED=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      # ------------------------------------------------------------------
      # 9. Tauri build
      #    macOS のみ --target で arch を指定（x64 / aarch64 を分離 job で）。
      #    TAURI_SIGNING_PRIVATE_KEY が設定されていれば tauri-cli が自動で
      #    `.sig` を各 bundle 隣に生成する。
      # ------------------------------------------------------------------
      - name: Build Tauri app
        run: npm run tauri:build -- ${{ matrix.platform.tauri_args }}
        env:
          CARGO_BUILD_JOBS: '2'

      # ------------------------------------------------------------------
      # 10a. signed build の場合、.sig が実際に生成されたかを verify (v1.20.1)
      #     tauri-cli は key フォーマット不正 / password ミス等で warning を
      #     出しつつ unsigned build にフォールバックすることがある。tag release
      #     で unsigned artifact を上流に流さないため、この step で実体確認する。
      # ------------------------------------------------------------------
      - name: Verify .sig files were generated (POSIX)
        if: runner.os != 'Windows' && env.SUMI_BUILD_SIGNED == 'true' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          BUNDLE_ROOT="src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle"
          if [ ! -d "$BUNDLE_ROOT" ]; then
            BUNDLE_ROOT="src-tauri/target/release/bundle"
          fi
          echo "Scanning $BUNDLE_ROOT for .sig files..."
          SIG_COUNT=$(find "$BUNDLE_ROOT" -type f -name '*.sig' | wc -l | tr -d ' ')
          echo "Found $SIG_COUNT .sig files:"
          find "$BUNDLE_ROOT" -type f -name '*.sig' || true
          if [ "$SIG_COUNT" = "0" ]; then
            echo "::error::No .sig files were generated despite TAURI_SIGNING_PRIVATE_KEY being set. tauri-cli silently fell back to unsigned build (check key format / password)."
            exit 1
          fi

      - name: Verify .sig files were generated (Windows)
        if: runner.os == 'Windows' && env.SUMI_BUILD_SIGNED == 'true' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          if (-Not (Test-Path $bundleRoot)) {
            Write-Error "bundle dir not found: $bundleRoot"
            exit 1
          }
          $sigs = Get-ChildItem -Path $bundleRoot -Recurse -Filter '*.sig' -File
          Write-Host "Found $($sigs.Count) .sig files:"
          $sigs | ForEach-Object { Write-Host "  $($_.FullName)" }
          if ($sigs.Count -eq 0) {
            Write-Host "::error::No .sig files were generated despite TAURI_SIGNING_PRIVATE_KEY being set. tauri-cli silently fell back to unsigned build (check key format / password)."
            exit 1
          }

      # ------------------------------------------------------------------
      # 10b. Artifact upload（Release 作成用に集約）
      #    bundle_globs に *.sig を含めているので signed build の場合は
      #    自動的に署名ファイルも一緒に収集される。
      # ------------------------------------------------------------------
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sumi-${{ matrix.platform.label }}
          path: ${{ matrix.platform.bundle_globs }}
          if-no-files-found: warn
          retention-days: 14

      # ------------------------------------------------------------------
      # 11. 失敗時のデバッグ情報
      # ------------------------------------------------------------------
      - name: Dump bundle tree on failure (POSIX)
        if: failure() && runner.os != 'Windows'
        run: |
          echo "=== target/release/bundle ==="
          if [ -d "src-tauri/target/release/bundle" ]; then
            find src-tauri/target/release/bundle -maxdepth 3 -type f | head -100
          fi
          echo "=== target/${{ matrix.platform.rust_target }}/release/bundle ==="
          if [ -d "src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle" ]; then
            find "src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle" -maxdepth 3 -type f | head -100
          fi

      - name: Dump bundle tree on failure (Windows)
        if: failure() && runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== bundle tree ==="
          if (Test-Path "src-tauri/target/release/bundle") {
            Get-ChildItem "src-tauri/target/release/bundle" -Recurse -Depth 3 | Format-Table FullName, Length
          }

  # --------------------------------------------------------------------------
  # release: 全 build job 成功後に GitHub Release を作成（tag push 時のみ）
  # --------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # tag push 時のみ。workflow_dispatch は artifact のみで終了。
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10

    steps:
      - name: Checkout (CHANGELOG 抽出用)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # ------------------------------------------------------------------
      # 1. 全 platform の artifact を単一ディレクトリに集約
      # ------------------------------------------------------------------
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: sumi-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          echo "=== artifacts/ ==="
          find artifacts -type f | sort
          echo "==================="

      # ------------------------------------------------------------------
      # 2. タグ名から version を抽出し、CHANGELOG.md から該当 chunk を抽出
      # ------------------------------------------------------------------
      - name: Extract version and release notes
        id: notes
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # CHANGELOG.md から `## [v1.18.0] - 2026-04-24` 〜 次の `## [` 直前までを
          # awk で抽出。v1.18.1 fix: `awk -v tag="[v1.18.0]"` + `$0 ~ "^## " tag` で
          # regex match させると `[v1.18.0]` が character class として解釈され
          # literal match しなくなるバグがあった（fallback notes に落ちる原因）。
          # `index($0, "## " tag) == 1` で先頭一致の literal match に変更し、
          # 終了条件は `substr($0, 1, 4) == "## ["` で次の見出しを判定する。
          NOTES_FILE="release-notes.md"
          awk -v header="## [$TAG_NAME]" '
            index($0, header) == 1 { flag = 1; print; next }
            flag && substr($0, 1, 4) == "## [" { flag = 0 }
            flag { print }
          ' CHANGELOG.md > "$NOTES_FILE"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "## $TAG_NAME" > "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            echo "自動生成された Release です。CHANGELOG.md に該当セクションが見つかりませんでした。" >> "$NOTES_FILE"
          fi

          echo "notes_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "=== release notes ==="
          cat "$NOTES_FILE"

      # ------------------------------------------------------------------
      # 3. tauri-plugin-updater 用 latest.json を生成 (DEC-065 v1.19.0)
      #    形式:
      #      {
      #        "version": "1.19.0",
      #        "notes": "...",
      #        "pub_date": "2026-04-24T00:00:00Z",
      #        "platforms": {
      #          "windows-x86_64": { "url": "...", "signature": "..." },
      #          "darwin-x86_64":  { "url": "...", "signature": "..." },
      #          "darwin-aarch64": { "url": "...", "signature": "..." },
      #          "linux-x86_64":   { "url": "...", "signature": "..." }
      #        }
      #      }
      #    URL は GitHub Release の安定 download URL を使う。
      #
      #    v1.19.0 変更 (DEC-065): Ed25519 署名検証に移行。
      #    tauri-cli が bundle 時に各 installer の隣に `<installer>.sig` を
      #    生成しているので、それを読んで signature field に埋め込む。
      #    signature は serde 上 String 必須 field のため、値は必須。
      #    もし .sig が見つからない場合は unsigned build のため updater は
      #    動かないが、latest.json は空文字でも生成して Release 自体は作る
      #    (既存 v1.18.2 からの手動 download を妨げないため)。
      # ------------------------------------------------------------------
      - name: Generate latest.json (updater manifest)
        id: manifest
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.notes.outputs.tag_name }}"
          VERSION="${{ steps.notes.outputs.version }}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPO_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}"

          # 各アーティファクトファイル名を glob から取得（1 枚目のみ採用、
          # .sig は除外）
          find_first() {
            local pattern="$1"
            local f
            f="$(find artifacts -type f -name "$pattern" ! -name '*.sig' | head -1 || true)"
            if [ -n "$f" ]; then
              basename "$f"
            fi
          }

          # 対応する .sig ファイルの中身（base64 1 行）を取得。
          # 無い場合は空文字を返す（unsigned build / fork PR 用の fallback）。
          read_sig() {
            local installer_name="$1"
            local f
            f="$(find artifacts -type f -name "${installer_name}.sig" | head -1 || true)"
            if [ -n "$f" ] && [ -s "$f" ]; then
              cat "$f"
            else
              echo ""
            fi
          }

          WIN_NSIS="$(find_first '*.exe')"
          # macOS は x64 / aarch64 で同じ拡張子なので、artifact dir 構造で絞り込み
          MAC_X64="$(find artifacts -type f -name '*.dmg' ! -name '*.sig' | grep -i 'x86_64\|x64\|intel' | head -1 | xargs -I{} basename {} || true)"
          MAC_ARM="$(find artifacts -type f -name '*.dmg' ! -name '*.sig' | grep -i 'aarch64\|arm64' | head -1 | xargs -I{} basename {} || true)"
          # grep で絞れなかった場合のフォールバック
          if [ -z "$MAC_X64" ]; then
            MAC_X64="$(find_first '*_x64.dmg')"
          fi
          if [ -z "$MAC_ARM" ]; then
            MAC_ARM="$(find_first '*_aarch64.dmg')"
          fi
          LINUX_APPIMAGE="$(find_first '*.AppImage')"

          # tauri-plugin-updater は Windows は NSIS の .exe、macOS は .dmg、
          # Linux は .AppImage を第一候補に取る。MSI / deb は併置のみ。
          WIN_URL=""
          WIN_SIG=""
          if [ -n "$WIN_NSIS" ]; then
            WIN_URL="${REPO_BASE}/${WIN_NSIS}"
            WIN_SIG="$(read_sig "$WIN_NSIS")"
          fi
          MAC_X64_URL=""
          MAC_X64_SIG=""
          if [ -n "$MAC_X64" ]; then
            MAC_X64_URL="${REPO_BASE}/${MAC_X64}"
            MAC_X64_SIG="$(read_sig "$MAC_X64")"
          fi
          MAC_ARM_URL=""
          MAC_ARM_SIG=""
          if [ -n "$MAC_ARM" ]; then
            MAC_ARM_URL="${REPO_BASE}/${MAC_ARM}"
            MAC_ARM_SIG="$(read_sig "$MAC_ARM")"
          fi
          LINUX_URL=""
          LINUX_SIG=""
          if [ -n "$LINUX_APPIMAGE" ]; then
            LINUX_URL="${REPO_BASE}/${LINUX_APPIMAGE}"
            LINUX_SIG="$(read_sig "$LINUX_APPIMAGE")"
          fi

          NOTES_TEXT="$(cat ${{ steps.notes.outputs.notes_path }})"

          # v1.19.0 (DEC-065): signature field を各 platform に必須で埋め込む。
          # tauri-plugin-updater v2.10.x の ReleaseManifestPlatform.signature は
          # serde 上 String 必須 field のため、key 自体を省略すると deserialize
          # 失敗する。signed build であれば .sig 内容、unsigned build であれば
          # 空文字になる（空文字の場合 updater は minisign parse 失敗で動かないが、
          # artifact 自体は Release に添付され手動 download 可能）。
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES_TEXT" \
            --arg pub_date "$PUB_DATE" \
            --arg win_url "$WIN_URL" \
            --arg win_sig "$WIN_SIG" \
            --arg mac_x64_url "$MAC_X64_URL" \
            --arg mac_x64_sig "$MAC_X64_SIG" \
            --arg mac_arm_url "$MAC_ARM_URL" \
            --arg mac_arm_sig "$MAC_ARM_SIG" \
            --arg linux_url "$LINUX_URL" \
            --arg linux_sig "$LINUX_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { url: $win_url, signature: $win_sig },
                "darwin-x86_64":  { url: $mac_x64_url, signature: $mac_x64_sig },
                "darwin-aarch64": { url: $mac_arm_url, signature: $mac_arm_sig },
                "linux-x86_64":   { url: $linux_url, signature: $linux_sig }
              }
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

          # 検証: 全 platform で signature field が存在すること（空文字でも OK、
          # key 自体が欠けていると v2.10.x updater が deserialize 失敗する）
          if ! jq -e '.platforms | to_entries | map(.value | has("signature")) | all' latest.json > /dev/null; then
            echo "ERROR: latest.json is missing 'signature' key in some platforms" >&2
            exit 1
          fi
          echo "OK: all platforms have 'signature' key"

          # v1.20.1 strict mode: tag release で URL がある platform の signature が
          # 空なら fail させる。unsigned latest.json を release すると既存
          # installed binary が minisign parse error で自動更新不能になる
          # （DEC-065 / v1.19.0-v1.20.0 で実発生した事故）。
          EMPTY_SIG_PLATFORMS=$(jq -r '.platforms | to_entries[] | select(.value.url != "" and .value.signature == "") | .key' latest.json)
          if [ -n "$EMPTY_SIG_PLATFORMS" ]; then
            echo "Platforms with empty signature:"
            echo "$EMPTY_SIG_PLATFORMS"
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              echo "::error::latest.json has empty signature for tag release. Refusing to publish (would break auto-update)."
              exit 1
            else
              echo "$EMPTY_SIG_PLATFORMS" | while read -r plat; do
                echo "::warning::Platform $plat has URL but empty signature (unsigned build, updater will fail)"
              done
            fi
          fi

      # ------------------------------------------------------------------
      # 4. GitHub Release 作成 + 全 artifact を upload
      # ------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.notes.outputs.tag_name }}
          name: ${{ steps.notes.outputs.tag_name }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
          fail_on_unmatched_files: false
          # v1.20.1: `.sig` も Release assets に含め、
          # latest.json と整合した署名ファイルを publicly verify できるようにする。
          files: |
            artifacts/**/*.exe
            artifacts/**/*.exe.sig
            artifacts/**/*.msi
            artifacts/**/*.msi.sig
            artifacts/**/*.dmg
            artifacts/**/*.dmg.sig
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.sig
            artifacts/**/*.deb
            artifacts/**/*.deb.sig
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sig
            latest.json
