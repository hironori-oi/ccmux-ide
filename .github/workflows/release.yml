# ============================================================================
# Sumi / Multi-platform Release Build (PM-282 / DEC-065 v1.19.0)
# ----------------------------------------------------------------------------
# 目的:
#   v* タグが push されたタイミングで Windows (NSIS/MSI) / macOS (DMG x64 +
#   aarch64) / Linux (AppImage/deb) のインストーラを並列ビルドし、GitHub
#   Release に自動添付する。合わせて tauri-plugin-updater 用の latest.json
#   を生成して同じ Release に upload する。
#
#   workflow_dispatch でも走らせられるが、その場合は Release を作らず artifact
#   upload のみ（dogfood 用）。
#
# トリガ:
#   - push tag v*   … 本番 Release 生成（prerelease は -rc / -beta を含む場合）
#   - workflow_dispatch … 手動ビルド、Release 非生成
#
# 既存 build-windows.yml は dogfood iteration 用に workflow_dispatch で残す。
# 本 workflow とは独立。
#
# DEC-065 (v1.19.0): Ed25519 署名検証ベースに移行。
#   - v1.18.2 で試みた「signature field 省略」方針A は tauri-plugin-updater
#     v2.10.x の ReleaseManifestPlatform.signature が serde 上 `String` 必須
#     field のため deserialize 失敗で破綻。Ed25519 鍵ペアを発行し、各 installer
#     に `.sig` ファイルを生成して latest.json の `signature` に埋め込む本来の
#     運用へ切り替えた。
#   - `TAURI_SIGNING_PRIVATE_KEY` / `TAURI_SIGNING_PRIVATE_KEY_PASSWORD` を
#     GitHub repository secrets に登録すると、tauri-cli が bundle 時に
#     自動で `.sig` を生成する。secret 未登録の fork PR では警告 log を出して
#     unsigned build で続行し、artifact は出るが updater は動かない（本家
#     main の release では必ず signed される）。
#
# 注意:
#   - Linux は ubuntu-latest（24.04）で webkit2gtk 4.1 前提。もし 22.04 系の
#     古い glibc 互換が必要になった場合は matrix に ubuntu-22.04 を追加する。
# ----------------------------------------------------------------------------

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (artifact upload only, no Release)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

# 同じタグで複数回起動されても最後のみ有効。並列ビルドを無駄に走らせない。
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # --------------------------------------------------------------------------
  # build: 各プラットフォームで Tauri bundle を生成
  # --------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.platform.label }})
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        platform:
          # DEC-065 (v1.19.0): 各 installer の `.sig` (ed25519 署名) も artifact
          # に含める。tauri-cli は `<installer>.sig` を同一ディレクトリに出力する。
          - label: 'windows-x86_64'
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ''
            bundle_globs: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.exe.sig
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/msi/*.msi.sig
          - label: 'darwin-x86_64'
            # v1.0.1: macos-13 は GitHub で deprecated、macos-14 (Apple Silicon)
            # で x86_64-apple-darwin を cross-compile する方針に変更。
            # rustup の target 追加 + `--target x86_64-apple-darwin` で動作。
            runner: macos-14
            rust_target: x86_64-apple-darwin
            tauri_args: '--target x86_64-apple-darwin'
            bundle_globs: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg.sig
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - label: 'darwin-aarch64'
            runner: macos-14
            rust_target: aarch64-apple-darwin
            tauri_args: '--target aarch64-apple-darwin'
            bundle_globs: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg.sig
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - label: 'linux-x86_64'
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: ''
            bundle_globs: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/appimage/*.AppImage.sig
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/deb/*.deb.sig

    env:
      # DEC-065 (v1.19.0): Ed25519 署名付きビルド。Secret 未登録だと空文字が
      # 渡り、tauri-cli は warning を出して unsigned bundle を生成する
      # (fork PR でも build は通る)。本家 main の tag release では必ず Secret
      # が登録されている前提で .sig が artifact に並ぶ。
      #
      # v1.20.2 (PM-284): PASSWORD が未登録 (Secret 欠落) でも空文字が default
      # で渡るよう明示。tauri-cli は空 password を前提に動くが、Secret 自体が
      # `${{ secrets.X }}` で未定義だと undefined/null 注入になり得るため、
      # `||`相当を workflow 側で保証する意図で `|| ''` 表記を検討したが、
      # Actions の expression syntax では `${{ secrets.X }}` が未登録だと
      # 空文字になるため、明示的な default 挿入は不要（GitHub 仕様）。
      #
      # v1.20.3 (PM-285): **passphrase 付き鍵に移行**。
      # GitHub Secrets は Value 空を許可しない UI 仕様のため、passphrase 無し
      # 鍵 + PASSWORD Secret 無しの運用は構造的に成立しない。さらに tauri-cli
      # signer は wrong password でも exit 0 を返す silent fail 挙動のため、
      # passphrase を強制することで「Secret 必須 + 正しい password 必須」の
      # 2 重保険をかける。PASSWORD Secret が空なら step 8c で即 fail。
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      NPM_CONFIG_LEGACY_PEER_DEPS: 'true'
      RUST_BACKTRACE: '1'
      TAURI_CLI_VERBOSE: '1'

    steps:
      # ------------------------------------------------------------------
      # 1. checkout
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1

      # ------------------------------------------------------------------
      # 2. Linux 用の追加依存（webkit2gtk / libayatana-appindicator / librsvg）
      #    ubuntu-latest = 24.04 では webkit2gtk-4.1 が必要。
      # ------------------------------------------------------------------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            file

      # ------------------------------------------------------------------
      # 3. Node.js 24 LTS
      # ------------------------------------------------------------------
      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            sidecar/package-lock.json

      # ------------------------------------------------------------------
      # 4. Rust 1.94.0 + ターゲット
      # ------------------------------------------------------------------
      - name: Setup Rust 1.94.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.94.0'
          targets: ${{ matrix.platform.rust_target }}

      # ------------------------------------------------------------------
      # 5. Cargo キャッシュ
      # ------------------------------------------------------------------
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.platform.label }}

      # ------------------------------------------------------------------
      # 6. npm / node_modules キャッシュ（キーに platform を含めて分離）
      # ------------------------------------------------------------------
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            node_modules
            sidecar/node_modules
          key: ${{ matrix.platform.label }}-node24-${{ hashFiles('package.json', 'sidecar/package.json') }}
          restore-keys: |
            ${{ matrix.platform.label }}-node24-

      # ------------------------------------------------------------------
      # 7. Frontend / Sidecar install + bundle
      # ------------------------------------------------------------------
      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Install sidecar dependencies
        working-directory: sidecar
        run: npm install

      - name: Bundle sidecar (esbuild)
        working-directory: sidecar
        run: npm run build

      - name: Verify sidecar bundle (POSIX)
        if: runner.os != 'Windows'
        run: |
          if [ ! -f "sidecar/dist/index.mjs" ]; then
            echo "sidecar/dist/index.mjs not found after build!" >&2
            exit 1
          fi
          ls -lh sidecar/dist/index.mjs

      - name: Verify sidecar bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-Not (Test-Path "sidecar/dist/index.mjs")) {
            Write-Error "sidecar/dist/index.mjs not found after build!"
            exit 1
          }
          Get-Item "sidecar/dist/index.mjs" | Select-Object Name, Length

      # ------------------------------------------------------------------
      # 8. 署名鍵の有無を check (DEC-065 v1.19.0 / v1.20.1 strict)
      #
      #    v1.19.0 までは Secret 未登録の fork PR を許容する graceful fallback
      #    だったが、**tag release (`refs/tags/v*`) では unsigned build を
      #    絶対に release させない** strict mode に変更した (v1.20.1)。
      #    v1.19.0 / v1.20.0 で signature が空の latest.json が配布され、
      #    既存 installed binary が「Invalid encoding in minisign data」エラーを
      #    吐いて自動更新不能になる事故を繰り返さないため。
      #
      #    - tag push の場合: Secret 未登録なら即 fail
      #    - workflow_dispatch (dry run) / PR: 従来通り warning のみで続行
      # ------------------------------------------------------------------
      - name: Check signing key availability (POSIX)
        if: runner.os != 'Windows'
        run: |
          IS_TAG="${GITHUB_REF#refs/tags/}"
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            if [ "$IS_TAG" != "$GITHUB_REF" ]; then
              echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set for a tag release. Refusing to publish unsigned bundle (would break auto-update for existing users)."
              exit 1
            fi
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY is not set. Building unsigned bundle (updater won't work)."
            echo "SUMI_BUILD_SIGNED=false" >> "$GITHUB_ENV"
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is set. Building signed bundle."
            echo "SUMI_BUILD_SIGNED=true" >> "$GITHUB_ENV"
          fi

      - name: Check signing key availability (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $isTag = $env:GITHUB_REF.StartsWith("refs/tags/")
          if ([string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY)) {
            if ($isTag) {
              Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY is not set for a tag release. Refusing to publish unsigned bundle (would break auto-update for existing users)."
              exit 1
            }
            Write-Host "::warning::TAURI_SIGNING_PRIVATE_KEY is not set. Building unsigned bundle (updater won't work)."
            "SUMI_BUILD_SIGNED=false" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            Write-Host "TAURI_SIGNING_PRIVATE_KEY is set. Building signed bundle."
            "SUMI_BUILD_SIGNED=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      # ------------------------------------------------------------------
      # 8b. 署名鍵の FORMAT 検証 (v1.20.2 / PM-284)
      #
      #    v1.20.0 〜 v1.20.1 で `.sig` 不生成の silent fallback 事故が続いた
      #    原因調査の結果、tauri-cli は Secret 値を以下の順で解釈する:
      #      1. 値が既存 file path なら file content を読む
      #      2. それ以外は literal content として base64 decode を試みる
      #      3. decode 結果が rsign encrypted format でない場合は fallback
      #    Secret に貼った値が 1 行 base64 ではなく、CRLF / trailing whitespace /
      #    改行混入で壊れていると (2) の decode が silently fail して unsigned
      #    build になる。ここで **build 開始前に Secret 値が rsign encrypted
      #    format にパース可能か** を verify して、壊れていたら即 fail する。
      #
      #    検証:
      #      - base64 decode した結果の先頭行が `untrusted comment:` で始まり
      #        `rsign encrypted secret key` を含むこと
      #      - 2 行目が base64 body として non-empty であること
      #
      #    tag release でのみ strict に検証、PR や workflow_dispatch ではスキップ。
      # ------------------------------------------------------------------
      - name: Verify TAURI_SIGNING_PRIVATE_KEY format (POSIX)
        if: runner.os != 'Windows' && env.SUMI_BUILD_SIGNED == 'true' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          # Secret を tmpfile に書き出し (stdout には出さない、漏洩防止)
          TMPKEY="$(mktemp)"
          trap 'rm -f "$TMPKEY"' EXIT
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$TMPKEY"

          # 1 行 base64 形式を想定。CRLF を LF に正規化して decode。
          DECODED="$(tr -d '\r' < "$TMPKEY" | base64 -d 2>/dev/null || true)"
          if [ -z "$DECODED" ]; then
            # 1 行 base64 decode 失敗 → multi-line raw 形式かもしれないので生を採用
            DECODED="$(tr -d '\r' < "$TMPKEY")"
          fi

          FIRST_LINE="$(printf '%s\n' "$DECODED" | head -1)"
          SECOND_LINE="$(printf '%s\n' "$DECODED" | sed -n '2p')"

          echo "First line (redacted prefix only): ${FIRST_LINE:0:40}..."
          if ! printf '%s' "$FIRST_LINE" | grep -q '^untrusted comment:'; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY format invalid: first line must start with 'untrusted comment:' (got: ${FIRST_LINE:0:60})"
            echo "::error::hint: paste the raw content of ~/.tauri/sumi.key (single-line base64) into GitHub secret, no extra whitespace/newlines."
            exit 1
          fi
          if ! printf '%s' "$FIRST_LINE" | grep -q 'rsign encrypted secret key'; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY format invalid: first line must contain 'rsign encrypted secret key' (got: ${FIRST_LINE})"
            exit 1
          fi
          if [ -z "$SECOND_LINE" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY format invalid: missing base64 body on second line"
            exit 1
          fi
          echo "OK: TAURI_SIGNING_PRIVATE_KEY parses as rsign encrypted secret key (first line header verified, body non-empty)."

      - name: Verify TAURI_SIGNING_PRIVATE_KEY format (Windows)
        if: runner.os == 'Windows' && env.SUMI_BUILD_SIGNED == 'true' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $raw = $env:TAURI_SIGNING_PRIVATE_KEY -replace "`r",""
          $decoded = $null
          try {
            $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($raw.Trim()))
          } catch {
            $decoded = $raw
          }
          $lines = $decoded -split "`n"
          $first = if ($lines.Count -ge 1) { $lines[0] } else { "" }
          $second = if ($lines.Count -ge 2) { $lines[1] } else { "" }
          Write-Host "First line (redacted prefix only): $($first.Substring(0, [Math]::Min(40, $first.Length)))..."
          if (-not $first.StartsWith("untrusted comment:")) {
            Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY format invalid: first line must start with 'untrusted comment:' (got prefix: $($first.Substring(0, [Math]::Min(60, $first.Length))))"
            Write-Host "::error::hint: paste the raw content of ~/.tauri/sumi.key (single-line base64) into GitHub secret, no extra whitespace/newlines."
            exit 1
          }
          if ($first -notmatch "rsign encrypted secret key") {
            Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY format invalid: first line must contain 'rsign encrypted secret key' (got: $first)"
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace($second)) {
            Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY format invalid: missing base64 body on second line"
            exit 1
          }
          Write-Host "OK: TAURI_SIGNING_PRIVATE_KEY parses as rsign encrypted secret key (first line header verified, body non-empty)."

      # ------------------------------------------------------------------
      # 8c. 署名鍵の PASSWORD 存在検証 (v1.20.3 / PM-285)
      #
      #    v1.20.2 でも `.sig` 不生成が続いた真因の再推定:
      #    tauri-cli の signer sign は passphrase が鍵と一致しない場合
      #    **stderr に "Wrong password" を出力するが exit code 0 を返す**。
      #    GitHub Actions の build step は exit 0 を success 扱いするため、
      #    signing が silent fail しても unsigned bundle で build が通る。
      #
      #    GitHub Secrets は Value 空を許可しない UI 仕様のため、
      #    passphrase 無し鍵 + PASSWORD Secret 無し運用は構造的に不可能。
      #    v1.20.3 で passphrase 付き鍵に移行、PASSWORD Secret 必須化。
      #
      #    ここで PASSWORD env が空 or 未定義の場合は tag release では
      #    即 fail、非 tag では warning に留める。
      # ------------------------------------------------------------------
      - name: Verify TAURI_SIGNING_PRIVATE_KEY_PASSWORD presence (POSIX)
        if: runner.os != 'Windows' && env.SUMI_BUILD_SIGNED == 'true'
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
              echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty or unset for a tag release. v1.20.3+ uses passphrase-protected keys; signing will silently fail (exit 0, no .sig)."
              echo "::error::hint: register the passphrase as GitHub secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD (non-empty value required)."
              exit 1
            fi
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty. If key is passphrase-protected, signing will silently fail."
          else
            echo "OK: TAURI_SIGNING_PRIVATE_KEY_PASSWORD is present (length redacted)."
          fi

      - name: Verify TAURI_SIGNING_PRIVATE_KEY_PASSWORD presence (Windows)
        if: runner.os == 'Windows' && env.SUMI_BUILD_SIGNED == 'true'
        shell: pwsh
        run: |
          if ([string]::IsNullOrEmpty($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            if ($env:GITHUB_REF.StartsWith("refs/tags/v")) {
              Write-Host "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty or unset for a tag release. v1.20.3+ uses passphrase-protected keys; signing will silently fail (exit 0, no .sig)."
              Write-Host "::error::hint: register the passphrase as GitHub secret TAURI_SIGNING_PRIVATE_KEY_PASSWORD (non-empty value required)."
              exit 1
            }
            Write-Host "::warning::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty. If key is passphrase-protected, signing will silently fail."
          } else {
            Write-Host "OK: TAURI_SIGNING_PRIVATE_KEY_PASSWORD is present (length redacted)."
          }

      # ------------------------------------------------------------------
      # 9. Tauri build
      #    macOS のみ --target で arch を指定（x64 / aarch64 を分離 job で）。
      #    TAURI_SIGNING_PRIVATE_KEY が設定されていれば tauri-cli が自動で
      #    `.sig` を各 bundle 隣に生成する (ただし v1.20.4 調査で判明した
      #    env 経由 passphrase の既知 bug により silent fallback が発生し得る。
      #    step 9b で明示 `signer sign` を走らせて二重防御する)。
      # ------------------------------------------------------------------
      - name: Build Tauri app
        run: npm run tauri:build -- ${{ matrix.platform.tauri_args }}
        env:
          CARGO_BUILD_JOBS: '2'

      # ------------------------------------------------------------------
      # 9b. 明示的に signer sign を実行 (v1.20.4 / PM-973)
      #
      #     真因 (v1.20.4 で確定):
      #     tauri-cli v2 には `TAURI_SIGNING_PRIVATE_KEY_PASSWORD` env 経由
      #     での passphrase 渡しが silently fail する既知 bug が複数存在する
      #     (tauri-apps/tauri #13485 / plugins-workspace #2710)。
      #     具体的には:
      #       - passphrase 生成時点で shell-quote 等により `!` `$` バッククォート
      #         `\` が silently escape され、鍵が "違う password" で encrypt
      #         されてしまう (mnardit 2026-04-04 post-mortem)
      #       - 結果として env で渡した元の passphrase では decode 失敗
      #       - build step は exit 0 で unsigned bundle を生成して続行
      #     v1.20.3 の passphrase `Sumi-Updater-2026-Secure!` はまさに
      #     末尾 `!` が escape 対象に該当し、この bug を踏んでいた。
      #
      #     対策:
      #     1. passphrase を shell-safe 文字のみ (`!$\\\`` 等を除外)
      #        で再生成する (オーナー作業 §0)
      #     2. 本 step で build 後に明示 `signer sign` を走らせ、生成された
      #        installer 各々に対して .sig を個別に生成する
      #        → build step の silent fallback に依存しない
      #
      #     実装:
      #       - env で key / password を渡す (v2 では CLI flag と env の
      #         両方がサポートされる、flag を使うとログに password が残る
      #         リスクがあるため env を継続採用)
      #       - bundle_globs では sig 未生成時のために *.sig を除外した
      #         installer のみを列挙し、for-loop で sign
      #       - signer sign が stderr に "Wrong password" を出すと exit 0
      #         で戻るため、出力を capture して pattern match、エラーなら
      #         明示 fail する (`.sig` 0 件 verify step と合わせて二重防御)
      # ------------------------------------------------------------------
      - name: Explicit signer sign (POSIX)
        if: runner.os != 'Windows' && env.SUMI_BUILD_SIGNED == 'true' && startsWith(github.ref, 'refs/tags/v')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          BUNDLE_ROOT="src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle"
          if [ ! -d "$BUNDLE_ROOT" ]; then
            BUNDLE_ROOT="src-tauri/target/release/bundle"
          fi
          echo "Bundle root: $BUNDLE_ROOT"

          # 既存 .sig があれば削除 (tauri build で自動生成された古い sig を
          # 上書きする。未生成であっても影響なし)
          find "$BUNDLE_ROOT" -type f -name '*.sig' -print -delete || true

          # sign 対象: .dmg / .AppImage / .deb / .app.tar.gz
          # macOS は .dmg と .app.tar.gz 両方、Linux は .AppImage と .deb 両方
          # updater は platform ごとに特定拡張子を参照するが、latest.json の
          # 組み立てで利用する候補をここで全て sign する
          TARGETS=$(find "$BUNDLE_ROOT" -type f \( \
            -iname '*.dmg' -o \
            -iname '*.AppImage' -o \
            -iname '*.deb' -o \
            -iname '*.app.tar.gz' \
          \) | sort)

          if [ -z "$TARGETS" ]; then
            echo "::error::No installer artifacts found under $BUNDLE_ROOT. Build may have failed silently."
            find "$BUNDLE_ROOT" -maxdepth 4 -type f | head -50
            exit 1
          fi

          echo "=== sign targets ==="
          echo "$TARGETS"
          echo "==================="

          # 各 installer を明示 sign。stderr を capture して "Wrong password"
          # pattern を検出したら即 fail (tauri-cli の silent fallback を catch)。
          FAIL=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "Signing: $f"
            # stdout/stderr 両方を tmp にも出し、exit code を別途確認
            SIGN_LOG="$(mktemp)"
            if ! npx --yes @tauri-apps/cli signer sign "$f" >"$SIGN_LOG" 2>&1; then
              echo "::error::signer sign exited non-zero for $f"
              cat "$SIGN_LOG"
              FAIL=1
              rm -f "$SIGN_LOG"
              continue
            fi
            # exit 0 でも "Wrong password" が出ていれば fail (tauri-cli bug 対策)
            if grep -qi 'wrong password' "$SIGN_LOG"; then
              echo "::error::signer sign reported 'Wrong password' for $f (tauri-cli #13485 env passphrase bug)."
              cat "$SIGN_LOG"
              FAIL=1
            fi
            cat "$SIGN_LOG"
            rm -f "$SIGN_LOG"
            # 対応する .sig が実在するか verify
            if [ ! -s "${f}.sig" ]; then
              echo "::error::expected ${f}.sig was not generated (empty or missing)"
              FAIL=1
            else
              echo "OK: ${f}.sig generated ($(wc -c <"${f}.sig") bytes)"
            fi
          done <<< "$TARGETS"

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::One or more installers failed to sign."
            exit 1
          fi

      - name: Explicit signer sign (Windows)
        if: runner.os == 'Windows' && env.SUMI_BUILD_SIGNED == 'true' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # v1.20.6 (PM-XXX): PowerShell の `Start-Process -FilePath 'npx'` は
        # Windows runner 上の `npx` が `npx.cmd` (バッチファイル) であるため
        # 「%1 is not a valid Win32 application」で起動失敗する
        # (`Start-Process -FilePath` は `.exe` を期待、`.cmd` は reject)。
        # → `cmd /c "npx --yes @tauri-apps/cli signer sign ... 2>stderr"` で
        # cmd.exe 経由に wrap することで `.cmd` 起動 + stderr capture を両立。
        # exit code / "Wrong password" pattern 検出 / .sig 存在 verify は維持。
        run: |
          $ErrorActionPreference = 'Stop'
          $bundleRoot = "src-tauri/target/release/bundle"
          if (-Not (Test-Path $bundleRoot)) {
            Write-Error "bundle dir not found: $bundleRoot"
            exit 1
          }
          Write-Host "Bundle root: $bundleRoot"

          # 既存 .sig は削除して自前 sign で上書き
          Get-ChildItem -Path $bundleRoot -Recurse -Filter '*.sig' -File -ErrorAction SilentlyContinue |
            ForEach-Object {
              Write-Host "Removing stale sig: $($_.FullName)"
              Remove-Item -Force $_.FullName
            }

          # sign 対象: .exe (NSIS) / .msi
          $targets = Get-ChildItem -Path $bundleRoot -Recurse -File -Include *.exe,*.msi -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch '\.sig$' } |
            Sort-Object FullName

          if (-not $targets -or $targets.Count -eq 0) {
            Write-Host "::error::No installer artifacts found under $bundleRoot. Build may have failed silently."
            Get-ChildItem -Path $bundleRoot -Recurse -File -ErrorAction SilentlyContinue |
              Select-Object -First 50 |
              ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          Write-Host "=== sign targets ==="
          $targets | ForEach-Object { Write-Host $_.FullName }
          Write-Host "==================="

          $fail = $false
          foreach ($t in $targets) {
            $path = $t.FullName
            Write-Host "Signing: $path"

            # v1.20.6: cmd /c で wrap して npx.cmd を起動可能にする。
            # stdout + stderr は merge して tmp file に落とし、PowerShell の
            # 2>&1 による ErrorRecord 化を回避する。
            $logFile = [System.IO.Path]::GetTempFileName()
            # 引数は cmd の single commandline として組み立てる。
            # path は二重引用符で囲う (spaces を含む場合に備えて)。
            # env var はそのまま埋め込む (base64 鍵 1 行 + 英数字 passphrase なので
            # special char escape は不要、cmd line 長は後段で verify)。
            $cmdLine = 'npx --yes @tauri-apps/cli signer sign -k "' + $env:TAURI_SIGNING_PRIVATE_KEY + '" -p "' + $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD + '" "' + $path + '" > "' + $logFile + '" 2>&1'

            # commandline 長の安全確認 (Windows cmd.exe の 8191 char 制限)
            if ($cmdLine.Length -gt 8000) {
              Write-Host "::warning::cmd line length $($cmdLine.Length) chars approaches Windows 8191 limit."
            }

            $p = Start-Process -FilePath 'cmd' -ArgumentList '/c', $cmdLine `
              -NoNewWindow -Wait -PassThru
            $combined = if (Test-Path $logFile) { Get-Content $logFile -Raw } else { "" }
            Write-Host $combined
            Remove-Item -Force $logFile -ErrorAction SilentlyContinue

            if ($p.ExitCode -ne 0) {
              Write-Host "::error::signer sign exited non-zero ($($p.ExitCode)) for $path"
              $fail = $true
              continue
            }
            if ($combined -match '(?i)wrong password') {
              Write-Host "::error::signer sign reported 'Wrong password' for $path (tauri-cli #13485 env passphrase bug)."
              $fail = $true
            }
            $sigPath = "$path.sig"
            if (-not (Test-Path $sigPath) -or ((Get-Item $sigPath).Length -eq 0)) {
              Write-Host "::error::expected $sigPath was not generated (empty or missing)"
              $fail = $true
            } else {
              $sz = (Get-Item $sigPath).Length
              Write-Host "OK: $sigPath generated ($sz bytes)"
            }
          }

          if ($fail) {
            Write-Host "::error::One or more installers failed to sign."
            exit 1
          }

      # ------------------------------------------------------------------
      # 10a. signed build の場合、.sig が実際に生成されたかを verify (v1.20.1)
      #     tauri-cli は key フォーマット不正 / password ミス等で warning を
      #     出しつつ unsigned build にフォールバックすることがある。tag release
      #     で unsigned artifact を上流に流さないため、この step で実体確認する。
      #     v1.20.4: 明示 signer sign step (9b) と合わせて二重防御として維持。
      # ------------------------------------------------------------------
      - name: Verify .sig files were generated (POSIX)
        if: runner.os != 'Windows' && env.SUMI_BUILD_SIGNED == 'true' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          BUNDLE_ROOT="src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle"
          if [ ! -d "$BUNDLE_ROOT" ]; then
            BUNDLE_ROOT="src-tauri/target/release/bundle"
          fi
          echo "Scanning $BUNDLE_ROOT for .sig files..."
          SIG_COUNT=$(find "$BUNDLE_ROOT" -type f -name '*.sig' | wc -l | tr -d ' ')
          echo "Found $SIG_COUNT .sig files:"
          find "$BUNDLE_ROOT" -type f -name '*.sig' || true
          if [ "$SIG_COUNT" = "0" ]; then
            echo "::error::No .sig files were generated despite TAURI_SIGNING_PRIVATE_KEY being set. tauri-cli silently fell back to unsigned build (check key format / password)."
            exit 1
          fi

      - name: Verify .sig files were generated (Windows)
        if: runner.os == 'Windows' && env.SUMI_BUILD_SIGNED == 'true' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/release/bundle"
          if (-Not (Test-Path $bundleRoot)) {
            Write-Error "bundle dir not found: $bundleRoot"
            exit 1
          }
          $sigs = Get-ChildItem -Path $bundleRoot -Recurse -Filter '*.sig' -File
          Write-Host "Found $($sigs.Count) .sig files:"
          $sigs | ForEach-Object { Write-Host "  $($_.FullName)" }
          if ($sigs.Count -eq 0) {
            Write-Host "::error::No .sig files were generated despite TAURI_SIGNING_PRIVATE_KEY being set. tauri-cli silently fell back to unsigned build (check key format / password)."
            exit 1
          }

      # ------------------------------------------------------------------
      # 10b. Artifact upload（Release 作成用に集約）
      #    bundle_globs に *.sig を含めているので signed build の場合は
      #    自動的に署名ファイルも一緒に収集される。
      # ------------------------------------------------------------------
      - name: Upload bundle artifact
        # v1.25.5: actions/upload-artifact@v7 / download-artifact@v8 で
        # macOS runner で `ENOTFOUND` (DNS 解決失敗) が散発的に発生。
        # @v4 (LTS) に rollback して artifact API の安定性を確保する。
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sumi-${{ matrix.platform.label }}
          path: ${{ matrix.platform.bundle_globs }}
          if-no-files-found: warn
          retention-days: 14

      # ------------------------------------------------------------------
      # 11. 失敗時のデバッグ情報
      # ------------------------------------------------------------------
      - name: Dump bundle tree on failure (POSIX)
        if: failure() && runner.os != 'Windows'
        run: |
          echo "=== target/release/bundle ==="
          if [ -d "src-tauri/target/release/bundle" ]; then
            find src-tauri/target/release/bundle -maxdepth 3 -type f | head -100
          fi
          echo "=== target/${{ matrix.platform.rust_target }}/release/bundle ==="
          if [ -d "src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle" ]; then
            find "src-tauri/target/${{ matrix.platform.rust_target }}/release/bundle" -maxdepth 3 -type f | head -100
          fi

      - name: Dump bundle tree on failure (Windows)
        if: failure() && runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== bundle tree ==="
          if (Test-Path "src-tauri/target/release/bundle") {
            Get-ChildItem "src-tauri/target/release/bundle" -Recurse -Depth 3 | Format-Table FullName, Length
          }

  # --------------------------------------------------------------------------
  # release: 全 build job 成功後に GitHub Release を作成（tag push 時のみ）
  # --------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # tag push 時のみ。workflow_dispatch は artifact のみで終了。
    if: startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 10

    steps:
      - name: Checkout (CHANGELOG 抽出用)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # ------------------------------------------------------------------
      # 1. 全 platform の artifact を単一ディレクトリに集約
      # ------------------------------------------------------------------
      - name: Download all build artifacts
        # v1.25.5: upload-artifact@v4 と version を揃える (v8 は v4 と互換)
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sumi-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          echo "=== artifacts/ ==="
          find artifacts -type f | sort
          echo "==================="

      # ------------------------------------------------------------------
      # 2. タグ名から version を抽出し、CHANGELOG.md から該当 chunk を抽出
      # ------------------------------------------------------------------
      - name: Extract version and release notes
        id: notes
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # CHANGELOG.md から `## [v1.18.0] - 2026-04-24` 〜 次の `## [` 直前までを
          # awk で抽出。v1.18.1 fix: `awk -v tag="[v1.18.0]"` + `$0 ~ "^## " tag` で
          # regex match させると `[v1.18.0]` が character class として解釈され
          # literal match しなくなるバグがあった（fallback notes に落ちる原因）。
          # `index($0, "## " tag) == 1` で先頭一致の literal match に変更し、
          # 終了条件は `substr($0, 1, 4) == "## ["` で次の見出しを判定する。
          NOTES_FILE="release-notes.md"
          awk -v header="## [$TAG_NAME]" '
            index($0, header) == 1 { flag = 1; print; next }
            flag && substr($0, 1, 4) == "## [" { flag = 0 }
            flag { print }
          ' CHANGELOG.md > "$NOTES_FILE"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "## $TAG_NAME" > "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            echo "自動生成された Release です。CHANGELOG.md に該当セクションが見つかりませんでした。" >> "$NOTES_FILE"
          fi

          echo "notes_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "=== release notes ==="
          cat "$NOTES_FILE"

      # ------------------------------------------------------------------
      # 3. tauri-plugin-updater 用 latest.json を生成 (DEC-065 v1.19.0)
      #    形式:
      #      {
      #        "version": "1.19.0",
      #        "notes": "...",
      #        "pub_date": "2026-04-24T00:00:00Z",
      #        "platforms": {
      #          "windows-x86_64": { "url": "...", "signature": "..." },
      #          "darwin-x86_64":  { "url": "...", "signature": "..." },
      #          "darwin-aarch64": { "url": "...", "signature": "..." },
      #          "linux-x86_64":   { "url": "...", "signature": "..." }
      #        }
      #      }
      #    URL は GitHub Release の安定 download URL を使う。
      #
      #    v1.19.0 変更 (DEC-065): Ed25519 署名検証に移行。
      #    tauri-cli が bundle 時に各 installer の隣に `<installer>.sig` を
      #    生成しているので、それを読んで signature field に埋め込む。
      #    signature は serde 上 String 必須 field のため、値は必須。
      #    もし .sig が見つからない場合は unsigned build のため updater は
      #    動かないが、latest.json は空文字でも生成して Release 自体は作る
      #    (既存 v1.18.2 からの手動 download を妨げないため)。
      # ------------------------------------------------------------------
      - name: Generate latest.json (updater manifest)
        id: manifest
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.notes.outputs.tag_name }}"
          VERSION="${{ steps.notes.outputs.version }}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REPO_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}"

          # 各アーティファクトファイル名を glob から取得（1 枚目のみ採用、
          # .sig は除外）
          find_first() {
            local pattern="$1"
            local f
            f="$(find artifacts -type f -name "$pattern" ! -name '*.sig' | head -1 || true)"
            if [ -n "$f" ]; then
              basename "$f"
            fi
          }

          # 対応する .sig ファイルの中身（base64 1 行）を取得。
          # 無い場合は空文字を返す（unsigned build / fork PR 用の fallback）。
          read_sig() {
            local installer_name="$1"
            local f
            f="$(find artifacts -type f -name "${installer_name}.sig" | head -1 || true)"
            if [ -n "$f" ] && [ -s "$f" ]; then
              cat "$f"
            else
              echo ""
            fi
          }

          WIN_NSIS="$(find_first '*.exe')"
          # macOS は x64 / aarch64 で同じ拡張子なので、artifact dir 構造で絞り込み
          MAC_X64="$(find artifacts -type f -name '*.dmg' ! -name '*.sig' | grep -i 'x86_64\|x64\|intel' | head -1 | xargs -I{} basename {} || true)"
          MAC_ARM="$(find artifacts -type f -name '*.dmg' ! -name '*.sig' | grep -i 'aarch64\|arm64' | head -1 | xargs -I{} basename {} || true)"
          # grep で絞れなかった場合のフォールバック
          if [ -z "$MAC_X64" ]; then
            MAC_X64="$(find_first '*_x64.dmg')"
          fi
          if [ -z "$MAC_ARM" ]; then
            MAC_ARM="$(find_first '*_aarch64.dmg')"
          fi
          LINUX_APPIMAGE="$(find_first '*.AppImage')"

          # tauri-plugin-updater は Windows は NSIS の .exe、macOS は .dmg、
          # Linux は .AppImage を第一候補に取る。MSI / deb は併置のみ。
          WIN_URL=""
          WIN_SIG=""
          if [ -n "$WIN_NSIS" ]; then
            WIN_URL="${REPO_BASE}/${WIN_NSIS}"
            WIN_SIG="$(read_sig "$WIN_NSIS")"
          fi
          MAC_X64_URL=""
          MAC_X64_SIG=""
          if [ -n "$MAC_X64" ]; then
            MAC_X64_URL="${REPO_BASE}/${MAC_X64}"
            MAC_X64_SIG="$(read_sig "$MAC_X64")"
          fi
          MAC_ARM_URL=""
          MAC_ARM_SIG=""
          if [ -n "$MAC_ARM" ]; then
            MAC_ARM_URL="${REPO_BASE}/${MAC_ARM}"
            MAC_ARM_SIG="$(read_sig "$MAC_ARM")"
          fi
          LINUX_URL=""
          LINUX_SIG=""
          if [ -n "$LINUX_APPIMAGE" ]; then
            LINUX_URL="${REPO_BASE}/${LINUX_APPIMAGE}"
            LINUX_SIG="$(read_sig "$LINUX_APPIMAGE")"
          fi

          NOTES_TEXT="$(cat ${{ steps.notes.outputs.notes_path }})"

          # v1.19.0 (DEC-065): signature field を各 platform に必須で埋め込む。
          # tauri-plugin-updater v2.10.x の ReleaseManifestPlatform.signature は
          # serde 上 String 必須 field のため、key 自体を省略すると deserialize
          # 失敗する。signed build であれば .sig 内容、unsigned build であれば
          # 空文字になる（空文字の場合 updater は minisign parse 失敗で動かないが、
          # artifact 自体は Release に添付され手動 download 可能）。
          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES_TEXT" \
            --arg pub_date "$PUB_DATE" \
            --arg win_url "$WIN_URL" \
            --arg win_sig "$WIN_SIG" \
            --arg mac_x64_url "$MAC_X64_URL" \
            --arg mac_x64_sig "$MAC_X64_SIG" \
            --arg mac_arm_url "$MAC_ARM_URL" \
            --arg mac_arm_sig "$MAC_ARM_SIG" \
            --arg linux_url "$LINUX_URL" \
            --arg linux_sig "$LINUX_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { url: $win_url, signature: $win_sig },
                "darwin-x86_64":  { url: $mac_x64_url, signature: $mac_x64_sig },
                "darwin-aarch64": { url: $mac_arm_url, signature: $mac_arm_sig },
                "linux-x86_64":   { url: $linux_url, signature: $linux_sig }
              }
            }' > latest.json

          echo "=== latest.json ==="
          cat latest.json

          # 検証: 全 platform で signature field が存在すること（空文字でも OK、
          # key 自体が欠けていると v2.10.x updater が deserialize 失敗する）
          if ! jq -e '.platforms | to_entries | map(.value | has("signature")) | all' latest.json > /dev/null; then
            echo "ERROR: latest.json is missing 'signature' key in some platforms" >&2
            exit 1
          fi
          echo "OK: all platforms have 'signature' key"

          # v1.20.1 strict mode: tag release で URL がある platform の signature が
          # 空なら fail させる。unsigned latest.json を release すると既存
          # installed binary が minisign parse error で自動更新不能になる
          # （DEC-065 / v1.19.0-v1.20.0 で実発生した事故）。
          EMPTY_SIG_PLATFORMS=$(jq -r '.platforms | to_entries[] | select(.value.url != "" and .value.signature == "") | .key' latest.json)
          if [ -n "$EMPTY_SIG_PLATFORMS" ]; then
            echo "Platforms with empty signature:"
            echo "$EMPTY_SIG_PLATFORMS"
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              echo "::error::latest.json has empty signature for tag release. Refusing to publish (would break auto-update)."
              exit 1
            else
              echo "$EMPTY_SIG_PLATFORMS" | while read -r plat; do
                echo "::warning::Platform $plat has URL but empty signature (unsigned build, updater will fail)"
              done
            fi
          fi

      # ------------------------------------------------------------------
      # 4. GitHub Release 作成 + 全 artifact を upload
      # ------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.notes.outputs.tag_name }}
          name: ${{ steps.notes.outputs.tag_name }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
          fail_on_unmatched_files: false
          # v1.20.1: `.sig` も Release assets に含め、
          # latest.json と整合した署名ファイルを publicly verify できるようにする。
          files: |
            artifacts/**/*.exe
            artifacts/**/*.exe.sig
            artifacts/**/*.msi
            artifacts/**/*.msi.sig
            artifacts/**/*.dmg
            artifacts/**/*.dmg.sig
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.sig
            artifacts/**/*.deb
            artifacts/**/*.deb.sig
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sig
            latest.json
